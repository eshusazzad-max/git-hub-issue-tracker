<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script>
    if(!localStorage.getItem("isLoggedIn")){
    window.location.href = "login.html"
    }
    </script>
    

</head>
<body class="bg-base-200 min-h-screen">
    <!-- NAVBAR -->
 <div class="navbar bg-base-100 shadow-sm px-6">

   <div class="flex-1 flex items-center gap-2">
    <img src="./assets/github-logo.png" class="w-6">
    <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
   </div>

   <div class="flex items-center gap-3">

    <input 
     id="searchInput"
     type="text"
     placeholder="Search issues..."
     class="input input-bordered input-sm w-64"
    />

    <button id="searchBtn" class="btn btn-primary btn-sm">Search</button>

   </div>

</div>

<!-- MAIN CONTAINER -->
<div class="max-w-7xl mx-auto p-6">
    <!-- TAB SECTION -->
 <div class="bg-base-100 p-4 rounded-lg shadow-sm mb-6">

  <div class="flex gap-3">

    <button id="allTab" class="btn btn-primary btn-sm">All</button>

    <button id="openTab" class="btn btn-outline btn-sm">Open</button>

    <button id="closedTab" class="btn btn-outline btn-sm">Closed</button>

  </div>

 </div>

 <!-- ISSUE HEADER -->
 <div class="flex justify-between items-center mb-6">

  <div class="flex items-center gap-3">
   <img src="./assets/Aperture.png" class="w-8">

   <div>
    <h2 class="text-lg font-semibold">50 Issues</h2>
    <p class="text-sm text-gray-500">Track and manage your project issues</p>
   </div>
  </div>


  <div class="flex items-center gap-6 text-sm">
   <div class="flex items-center gap-2">
    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
     Open
   </div>

   <div class="flex items-center gap-2">
    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
     Closed
   </div>
  </div>
 </div>

 <!-- ISSUE CARDS GRID -->
 <div id="loadingSpinner" class="flex justify-center my-10 hidden">
  <span class="loading loading-spinner loading-lg text-primary"></span>
 </div>

 <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
 </div>

</div>

 <!-- ISSUE MODAL -->  
<dialog id="issueModal" class="modal">
  <div class="modal-box max-w-xl">

    <h3 id="modalTitle" class="text-xl font-semibold mb-2"></h3>

    <div class="flex items-center gap-2 text-sm mb-4">
      <span id="modalStatus" class="badge badge-success"></span>
      <span>Opened by <span id="modalAuthor"></span></span>
      <span id="modalCreated"></span>
    </div>

    <div class="flex gap-2 mb-4">
      <span id="modalLabel" class="badge badge-error badge-outline"></span>
    </div>

    <p id="modalDescription" class="text-gray-600 mb-4"></p>

    <div class="grid grid-cols-2 gap-4 bg-base-200 p-4 rounded-lg">
      <div>
        <p class="text-sm text-gray-500">Assignee:</p>
        <p id="modalAssignee" class="font-medium"></p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Priority:</p>
        <span id="modalPriority" class="badge badge-error"></span>
      </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>

  </div>
</dialog>

<script src="script.js"></script>
  
</body>
</html>
