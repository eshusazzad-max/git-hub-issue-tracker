<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script>
    if(!localStorage.getItem("isLoggedIn")){
    window.location.href = "login.html"
    }
    </script>

</head>
<body class="bg-base-200 min-h-screen">
    <!-- NAVBAR -->
 <div class="navbar bg-base-100 shadow-sm px-6">

   <div class="flex-1 flex items-center gap-2">
    <img src="./assets/github-logo.png" class="w-6">
    <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
   </div>

   <div class="flex items-center gap-3">

    <input 
     id="searchInput"
     type="text"
     placeholder="Search issues..."
     class="input input-bordered input-sm w-64"
    />

    <button id="searchBtn" class="btn btn-primary btn-sm">+ New Issue</button>

   </div>

</div>

<!-- MAIN CONTAINER -->
<div class="max-w-7xl mx-auto p-6">
    <!-- TAB SECTION -->
 <div class="bg-base-100 p-4 rounded-lg shadow-sm mb-6">

  <div class="flex gap-3">

    <button id="allTab" class="btn btn-primary btn-sm">All</button>

    <button id="openTab" class="btn btn-outline btn-sm">Open</button>

    <button id="closedTab" class="btn btn-outline btn-sm">Closed</button>

  </div>

 </div>

</div>

    
</body>
</html>
